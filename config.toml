[server]
listen_udp       = "0.0.0.0:5353"   # Use 53 in production (requires root or cap_net_bind_service)
listen_tcp       = "0.0.0.0:5353"
udp_payload_size = 4096

[upstream]
resolvers  = ["8.8.8.8:53", "1.1.1.1:53"]
timeout_ms = 3000

[blocklist]
refresh_interval_secs = 86400    # 24 hours
block_response        = "nxdomain"  # "nxdomain" or "sinkhole"
sinkhole_ipv4         = "0.0.0.0"
sinkhole_ipv6         = "::"

# StevenBlack unified hosts file (ads + malware)
# https://github.com/StevenBlack/hosts
[[blocklist.sources]]
url     = "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
format  = "hosts"
enabled = true

# Hagezi Pro blocklist - domains format
# https://github.com/hagezi/dns-blocklists
[[blocklist.sources]]
url     = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/domains/pro.txt"
format  = "domains"
enabled = true

# Hagezi Pro wildcard blocklist
[[blocklist.sources]]
url     = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/wildcard/pro.txt"
format  = "domains"
enabled = true
