[server]
listen_udp       = "0.0.0.0:53"   # Use 53 in production (requires root or cap_net_bind_service)
udp_payload_size = 4096
debug            = true              # Log every DNS query to stdout

# DNS-over-TLS incoming listener (port 853 standard, requires root or capability).
# Remove or comment out this section to disable the DoT listener.
# Generate a self-signed cert for testing:
#   openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=dns-filter"
[server.dot]
listen   = "0.0.0.0:853"   # Use 853 in production
cert_pem = "cert.pem"
key_pem  = "key.pem"

[upstream]
timeout_ms = 3000
# Original VPC/system DNS for local queries (bypass blocklist).
# On AWS EC2 this is typically the VPC DNS at x.x.x.2 (e.g. 172.31.0.2:53).
# Set by install.sh automatically. Remove to disable local bypass.
# local_resolver = "172.31.0.2:53"

# Upstream resolvers use DNS-over-TLS (port 853)
[[upstream.resolvers]]
addr     = "8.8.8.8:853"
tls_name = "dns.google"

[[upstream.resolvers]]
addr     = "1.1.1.1:853"
tls_name = "cloudflare-dns.com"

[logging]
enabled        = true
db_path        = "query_log.db"      # SQLite database file
retention_days = 7                    # Auto-purge entries older than this

[blocklist]
refresh_interval_secs = 86400
block_response        = "nxdomain"   # "nxdomain" or "sinkhole"
sinkhole_ipv4         = "0.0.0.0"
sinkhole_ipv6         = "::"

[[blocklist.sources]]
url     = "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
format  = "hosts"
enabled = true

[[blocklist.sources]]
url     = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/domains/pro.txt"
format  = "domains"
enabled = true

[[blocklist.sources]]
url     = "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/wildcard/pro.txt"
format  = "domains"
enabled = true
